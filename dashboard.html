<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Dashboard de Hábitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>HabitTrack</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active">Resumen</a></li>
                    <li><a href="#">Mis Hábitos</a></li>
                    <li><a href="#">Estadísticas</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Panel de Progreso</h1>
            </header>

            <section class="dashboard-grid">
                <article class="habit-card">
                    <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400" alt="Libro" class="habit-img">
                    <div class="habit-info">
                        <h3>Lectura Diaria</h3>
                        <div class="progress-bar"><div class="progress" style="width: 70%;"></div></div>
                    </div>
                </article>

                <article class="habit-card">
                    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=400" alt="Gimnasio" class="habit-img">
                    <div class="habit-info">
                        <h3>Gimnasio</h3>
                        <div class="progress-bar"><div class="progress" style="width: 45%;"></div></div>
                    </div>
                </article>

                <article class="habit-card">
                    <img src="https://images.unsplash.com/photo-1523362628745-0c100150b504?auto=format&fit=crop&q=80&w=400" alt="Agua" class="habit-img">
                    <div class="habit-info">
                        <h3>Hidratación</h3>
                        <p>Meta: 2 Litros</p>
                        <div class="progress-bar"><div class="progress" style="width: 90%;"></div></div>
                    </div>
                </article>

                <article class="habit-card">
                    <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=400" alt="Zen" class="habit-img">
                    <div class="habit-info">
                        <h3>Meditación</h3>
                        <p>Meta: 15 min</p>
                        <div class="progress-bar"><div class="progress" style="width: 30%;"></div></div>
                    </div>
                </article>
            </section>
        </main>
    </div> </body>
</html>
